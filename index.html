<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Core | MULY@.ID</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: white; margin: 0; }
    .cyber-card { background: rgba(11, 14, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
    .glow-border-blue { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal-active { display: flex !important; }
  </style>
</head>
<body class="p-4 md:p-8">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
    <div>
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl shadow-lg shadow-blue-900/40">M</div>
        <h1 class="text-xl md:text-2xl font-extrabold tracking-tighter uppercase italic text-blue-500">Analytics <span class="text-white underline decoration-blue-500/30 text-white">Dashboard</span></h1>
      </div>
      <p class="text-[10px] text-gray-500 font-bold tracking-[0.3em] uppercase">Core Engine v2.0 • Muly@.ID</p>
    </div>
    
    <div class="flex gap-2">
        <button onclick="fetchData()" id="btn-sync" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold text-[10px] tracking-widest transition-all flex items-center gap-2">
          <span>RUN SYNC DATABASE</span>
          <div id="btn-loader" class="hidden w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
    </div>
  </div>

  <!-- SUMMARY CARDS (Keberhasilan) -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-container">
    <!-- Diisi otomatis oleh JavaScript -->
  </div>

  <!-- MAIN TABLE CONTAINER -->
  <div class="cyber-card rounded-2xl overflow-hidden shadow-2xl border border-white/5">
    <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
      <h2 class="text-xs font-black tracking-widest text-gray-400 uppercase">Production Distribution & Performance Audit</h2>
      <div class="text-[10px] font-bold text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">LIVE DATA FEED</div>
    </div>
    
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="text-[9px] font-black uppercase tracking-widest text-gray-500 bg-black/40">
            <th class="p-4 border-b border-white/5">Tanggal / Hari</th>
            <th class="p-4 border-b border-white/5 text-blue-400">Team Leader / Shift</th>
            <th class="p-4 border-b border-white/5 text-center bg-blue-500/5">MP Planning (S|P)</th>
            <th class="p-4 border-b border-white/5 text-center bg-purple-500/5">MP Actual (S|P)</th>
            <th class="p-4 border-b border-white/5 text-right">Target Plan</th>
            <th class="p-4 border-b border-white/5 text-right">Target Act</th>
            <th class="p-4 border-b border-white/5 text-right text-blue-400">Total Ach</th>
            <th class="p-4 border-b border-white/5 text-center">Ach Plan (%)</th>
            <th class="p-4 border-b border-white/5 text-center">Ach Act (%)</th>
          </tr>
        </thead>
        <tbody id="table-body" class="text-[11px] font-bold">
          <!-- Data Rows -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- POPUP MODAL (Audit Karyawan) -->
  <div id="modal-audit" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center p-4">
    <div class="cyber-card w-full max-w-2xl max-h-[80vh] rounded-3xl border border-blue-500/30 overflow-hidden flex flex-col shadow-2xl">
      <div class="p-6 border-b border-white/5 flex justify-between items-center bg-blue-600/10">
        <div>
          <h3 id="modal-title" class="text-lg font-black italic tracking-tighter uppercase text-blue-400">MP AUDIT LIST</h3>
          <p id="modal-subtitle" class="text-[9px] text-gray-500 font-bold tracking-widest"></p>
        </div>
        <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/5 hover:bg-red-500/20 text-white flex items-center justify-center transition-all">&times;</button>
      </div>
      <div class="p-6 overflow-y-auto" id="modal-content">
        <!-- List Karyawan -->
      </div>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] hidden flex-col items-center justify-center">
    <div class="loader w-14 h-14 border-4 border-white/10 rounded-full mb-4"></div>
    <p class="text-[10px] font-black tracking-[0.5em] text-blue-500 animate-pulse uppercase">Syncing Muly@.ID Database...</p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzjZk_1bGrE5s41LxQuEwpfOXQ4fghyBqMMk6PvG8zKYZE1Tcowr9Yc-jO_CWxiUg59uQ/exec?action=getData";
    let globalData = [];

    async function fetchData() {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.add('flex');
      overlay.classList.remove('hidden');

      try {
        const response = await fetch(API_URL);
        globalData = await response.json();
        renderDashboard(globalData);
      } catch (err) {
        alert("Gagal koneksi ke API!");
      } finally {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
      }
    }

    function renderDashboard(data) {
      const tableBody = document.getElementById('table-body');
      tableBody.innerHTML = '';
      
      let summary = { totalAch: 0, totalTargetAct: 0, successCount: 0, failCount: 0 };

      data.forEach((row, index) => {
        summary.totalAch += row.totalAch;
        summary.totalTargetAct += row.targetAct;
        row.ketAct === "BERHASIL" ? summary.successCount++ : summary.failCount++;

        const getStatusColor = (val) => val >= 90 ? 'text-green-400 bg-green-500/10' : (val >= 80 ? 'text-yellow-400 bg-yellow-500/10' : 'text-red-400 bg-red-500/10');

        tableBody.innerHTML += `
          <tr class="hover:bg-white/5 border-b border-white/5 transition-all">
            <td class="p-4">
              <span class="text-white block">${row.tanggal}</span>
              <span class="text-[9px] text-gray-500 uppercase">${row.hari}</span>
            </td>
            <td class="p-4">
              <span class="text-blue-400 font-extrabold block tracking-tighter uppercase">${row.tl}</span>
              <span class="text-[9px] bg-slate-800 px-2 py-0.5 rounded text-gray-400">${row.shift}</span>
            </td>
            <td class="p-4 text-center bg-blue-500/5 cursor-pointer hover:bg-blue-500/20" onclick="showAudit(${index}, 'plan')">
              <div class="text-white text-sm font-black">${row.planSenior + row.planProb}</div>
              <div class="text-[8px] text-blue-300 tracking-tighter italic">S:${row.planSenior} | P:${row.planProb}</div>
            </td>
            <td class="p-4 text-center bg-purple-500/5 cursor-pointer hover:bg-purple-500/20" onclick="showAudit(${index}, 'act')">
              <div class="text-white text-sm font-black">${row.actSenior + row.actProb}</div>
              <div class="text-[8px] text-purple-300 tracking-tighter italic">S:${row.actSenior} | P:${row.actProb}</div>
            </td>
            <td class="p-4 text-right font-mono text-gray-500">${row.targetPlan.toLocaleString()}</td>
            <td class="p-4 text-right font-mono text-gray-300">${row.targetAct.toLocaleString()}</td>
            <td class="p-4 text-right font-mono text-blue-400 font-black">${row.totalAch.toLocaleString()}</td>
            <td class="p-4 text-center">
              <div class="py-2 px-1 rounded-lg border border-white/5 font-black ${getStatusColor(row.percPlan)}">${row.percPlan}%</div>
              <div class="text-[7px] mt-1 tracking-widest text-gray-600">${row.ketPlan}</div>
            </td>
            <td class="p-4 text-center">
              <div class="py-2 px-1 rounded-lg border border-white/5 font-black ${getStatusColor(row.percAct)}">${row.percAct}%</div>
              <div class="text-[7px] mt-1 tracking-widest text-gray-600">${row.ketAct}</div>
            </td>
          </tr>
        `;
      });

      updateSummary(summary);
    }

    function showAudit(index, type) {
      const item = globalData[index];
      const list = type === 'plan' ? 
        [...(item.planSeniorList || []), ...(item.planProbList || [])] : 
        [...(item.actSeniorList || []), ...(item.actProbList || [])];
      
      document.getElementById('modal-title').innerText = `${type.toUpperCase()} AUDIT: ${item.tl}`;
      document.getElementById('modal-subtitle').innerText = `${item.tanggal} | SHIFT ${item.shift}`;
      
      const content = document.getElementById('modal-content');
      content.innerHTML = list.length ? list.map(emp => `
        <div class="flex justify-between items-center p-3 mb-2 bg-white/5 rounded-xl border border-white/5">
          <div>
            <div class="text-[11px] font-black uppercase text-blue-400 tracking-tighter">${emp.nama}</div>
            <div class="text-[9px] text-gray-500">Status: ${emp.status}</div>
          </div>
          <div class="text-[10px] font-mono text-gray-400">${emp.jam || '-'}</div>
        </div>
      `).join('') : '<p class="text-center text-gray-600 text-xs py-10 italic">Data list tidak ditemukan pada report.</p>';

      document.getElementById('modal-audit').classList.add('modal-active');
    }

    function closeModal() {
      document.getElementById('modal-audit').classList.remove('modal-active');
    }

    function updateSummary(s) {
      const container = document.getElementById('stats-container');
      const avg = s.totalTargetAct > 0 ? ((s.totalAch / s.totalTargetAct) * 100).toFixed(1) : 0;
      
      const stats = [
        { label: 'Total Pencapaian', val: s.totalAch.toLocaleString(), color: 'text-blue-500', sub: 'Pcs Completed' },
        { label: 'Avg Achievement', val: avg + '%', color: avg >= 90 ? 'text-green-400' : 'text-red-400', sub: 'Global Performance' },
        { label: 'Ringkasan Berhasil', val: s.successCount, color: 'text-green-500', sub: 'Shift Target Met' },
        { label: 'Ringkasan Gagal', val: s.failCount, color: 'text-red-500', sub: 'Under Target' }
      ];

      container.innerHTML = stats.map(st => `
        <div class="cyber-card p-5 rounded-2xl glow-blue border-white/10">
          <p class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-500 mb-1">${st.label}</p>
          <p class="text-2xl font-black italic ${st.color} tracking-tighter">${st.val}</p>
          <p class="text-[8px] text-gray-600 font-bold mt-1 uppercase">${st.sub}</p>
        </div>
      `).join('');
    }

    window.onload = fetchData;
  </script>
</body>
</html>
